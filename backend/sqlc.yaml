version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          # google/uuid for uuid columns (non-nullable + nullable->pointer).
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          # numeric -> string: exact, lossless, ergonomic (pgtype.Numeric is awkward).
          - db_type: "pg_catalog.numeric"
            go_type: "string"
          - db_type: "pg_catalog.numeric"
            nullable: true
            go_type:
              type: "string"
              pointer: true
          # timestamptz -> time.Time (nullable -> *time.Time) instead of pgtype.Timestamptz.
          - db_type: "timestamptz"
            go_type: "time.Time"
          - db_type: "timestamptz"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
          # date -> time.Time (nullable -> *time.Time) instead of pgtype.Date.
          - db_type: "date"
            go_type: "time.Time"
          - db_type: "date"
            nullable: true
            go_type:
              type: "time.Time"
              pointer: true
