# SonarQube-Scanner-Konfiguration — aus dem Ordner backend/ ausführen:
#   sonar-scanner -Dsonar.host.url=http://localhost:9000 -Dsonar.token=<TOKEN>
#
# Go-Unterstützung ist in SonarQube Community eingebaut (kein Plugin nötig).

sonar.projectKey=prekaj-zeiterfassung-backend
sonar.projectName=Prekaj-Zeiterfassung Backend
sonar.projectVersion=1.0

# Analysierte Quellen (relativ zu backend/)
sonar.sources=.
sonar.sourceEncoding=UTF-8

# Generierter sqlc-Code und Binaries aus der Komplexitäts-/Quality-Analyse ausnehmen,
# damit die Metriken nur den handgeschriebenen Code widerspiegeln.
sonar.exclusions=**/*_test.go,**/*.sql.go,internal/db/**,bin/**,cmd/seed/**,**/*.html

# Tests
sonar.tests=.
sonar.test.inclusions=**/*_test.go

# Coverage- und Test-Report (im Ordner backend/ erzeugt durch `make coverage`)
sonar.go.coverage.reportPaths=coverage.out
sonar.go.tests.reportPaths=test-report.json
